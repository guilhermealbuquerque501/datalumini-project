<<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Simulador Financeiro Arabidopsis thaliana</title>
</head>

<body>
    <div class="container-simulador">
        <div class="container-simulador-titulo">
            <div class="container-simulado-titulo-h1">
                <h1>Simulador Financeiro: Sensor de iluminação da
                    <span style="font-style: italic; font-weight: 600;">Arabidopsis thaliana</span>
                </h1>
            </div>
            <div class="container-simulador-logo2">
                <img src="./images/6.png" alt="">
            </div>
            <div class="container-simulador-logo">
                <img src="./images/4.png" alt="">
            </div>
        </div>
        <div class="content-simulador">
            <div class="content-simulador-right">
                <div class="content-right-group">
                    <div class="content-right-row">
                        <label for="id_horasLigado">Insira quantas horas por dia seu ambiente permanece ligado:</label>
                        <input type="number" id="id_horasLigado">
                    </div>
                    <div class="content-right-row">
                        <label for="id_kwhGasto">Insira a quantidade de KWh ( Quilowatt / Hora ) anual:</label>
                        <input type="number" id="id_kwhGasto">
                    </div>
                    <div class="content-right-row">
                        <label for="id_precoKWh">Insira o preço do KWh em seu ambiente controlado (em R$):</label>
                        <input type="number" id="id_precoKWh">
                    </div>
                    <div class="content-right-button">
                        <button onclick="calcular1()">Calcular gasto monetário anual</button>
                    </div>
                </div>
                <div class="content-right-res">
                    <h3 id="id_mensagem"></h3>
                    <h3></h3>
                </div>
            </div>
            <div class="content-simulador-left">
                <div class="content-right-group">
                    <div class="content-right-row">
                        <label for="id_luz_atual">Insira a iluminação atual captada pelo sensor em
                            (µmol·m⁻²·s⁻¹):</label>
                        <input type="number" id="id_luz_atual"><br>
                    </div>
                    <div class="content-right-row">
                        <label for="id_qtd_horas">Insira quantas horas por dia seu ambiente permanece ligado:</label>
                        <input type="number" id="id_qtd_horas" style="transform: translateX(7%);"><br>
                    </div>
                    <div class="content-right-row">
                    </div>
                    <div class="content-right-button">
                        <button onclick="calcular2()">Calcular resultados esperados</button>
                    </div>
                </div>
                <div class="content-right-res">
                    <h3 id="id_resultado_luz"></h3>
                    <h3 id="id_resultado_horas"></h3>
                </div>
            </div>
        </div>
</body>

</html>

<script>

    // Função responsável por calcular o gasto de energia e possível prejuízo
    function calcular1() {

        // Pega o valor digitado no input de kWh gasto e converte para número
        let kwhGasto = Number(id_kwhGasto.value);

        // Pega o preço do kWh digitado pelo usuário
        let precoKWh = Number(id_precoKWh.value);

        // Pega quantas horas por dia a iluminação fica ligada
        let horasLigado = Number(id_horasLigado.value);

        // Calcula o gasto total em dinheiro (kWh gasto * preço do kWh)
        let totalGasto = kwhGasto * precoKWh;

        // Variáveis que irão armazenar a porcentagem de prejuízo e o valor do prejuízo
        let porcentagem = 0;
        let prejuizo = 0;


        // Se as luzes ficarem ligadas mais de 16h (tempo ideal)
        if (horasLigado > 16) {

            // Calcula o custo das horas extras que não seriam necessárias
            prejuizo = (totalGasto / (horasLigado * 365)) * ((horasLigado - 16) * 365);

            // Caso esteja exatamente no valor ideal
        } else if (horasLigado == 16) {

            // Não existe prejuízo
            prejuizo = 0;

            // Caso esteja abaixo do ideal
        } else if (horasLigado < 16) {

            // Calcula uma estimativa de perda por falta de iluminação
            prejuizo = (16 - horasLigado);
        }

        // Calcula qual porcentagem do gasto total corresponde ao prejuízo
        porcentagem = (prejuizo / totalGasto) * 100;


        // Verificação de erro caso os campos estejam preenchidos incorretamente
        if (horasLigado < 0 || kwhGasto <= 0 || precoKWh <= 0) {

            id_mensagem.innerHTML = `Você nâo preenchou todos os campos de forma correta, <b> tente novamente. </b>`;

            // Caso as luzes não estejam ligadas
        } else if (horasLigado == 0) {

            id_mensagem.innerHTML = `O seu plantio não está sendo iluminado adequadamente, isso causará a <b> perda de toda a pesquisa!</b> 
                Você deve iluminar suas espécimes de <b> <i> Arabidopsis thaliana </i> </b> cerca de 16 horas continuas. <br><br>
                
                <b>Obs: </b> O valor de retrabalho por câmara da <i>Arabidopsis thaliana</i> não pode ser calculado, por vários fatores 
            váriaveis de produção que deve ser calculado pelo cliente.`;

            // Caso esteja abaixo do tempo ideal
        } else if (horasLigado == 16) {

            // Exibe os resultados do cálculo
            id_mensagem.innerHTML = `O seu gasto monetário anual com iluminação em seu ambiente controlado é de <span style="color:green;"> R$${totalGasto.toFixed(2)}!. </span>
            A quantidade de horas de iluminação está ideal (16 horas), logo você não tem nenhum tipo de prejuizo ou risco relacionado a iluminação.`;

            // Caso esteja tudo correto ou acima do ideal
        } else if (horasLigado < 16) {

            id_mensagem.innerHTML = `O seu plantio não vai crescer como deveria! 
            Você deve iluminar espécimes de <b> <i> Arabidopsis thaliana </i> </b> cerca de 16 horas continuas. Há uma chance de perder sua pesquisa ou acabar atrasando cerca de <span style="color: red;"> ${horasLigado * 365} horas </span> de desenvolvimento no ano. <br> <br>
            
               <b>Obs: </b> O valor de retrabalho por câmara da <i>Arabidopsis thaliana</i> não pode ser calculado, por vários fatores 
            váriaveis de produção que deve ser calculado pelo cliente.`;

            // Caso esteja tudo correto ou acima do ideal
        }
        else if (horasLigado > 24) {
            id_mensagem.innerHTML = `O máximo de horas em um dia são 24 horas! <b> Preencha o campo corretamente. </b>`;
        }
        else {

            // Exibe os resultados do cálculo
            id_mensagem.innerHTML = `O seu gasto monetário anual com iluminação em seu ambiente controlado é de <span style="color:green;"> <b> R$${totalGasto.toFixed(2)} </b> </span>,
            sendo <span style="color:red"> <b> R$${prejuizo.toFixed(2)} </b> </span>só de <span style="color:red"><b>prejuízo</b></span>, o que equivale a <b> ${porcentagem.toFixed(2)}% </b> do gasto total.
            <br><br>A taxa e valor de prejuízo são calculados a partir do número de horas a mais que a planta recebe, comparado ao
            número ideal que é 16 horas. <br> <br>
            
            <b>Obs: </b> O valor de retrabalho por câmara da <i>Arabidopsis thaliana</i> não pode ser calculado, por vários fatores 
            váriaveis de produção que deve ser calculado pelo cliente.`;
        }

        // Mostra o valor do prejuízo no console do navegador (para debug)
        console.log(prejuizo);
    }



    // Função responsável por analisar se a iluminação está adequada
    function calcular2() {

        // Quantidade de horas de iluminação por dia
        let qtd_horas = Number(id_qtd_horas.value);

        // Intensidade atual da luz medida em µmol·m⁻²·s⁻¹
        let luz_atual = Number(id_luz_atual.value);


        // Cálculo da porcentagem abaixo do ideal
        luz_inferior = (100 - ((luz_atual * 100) / 120));

        // Cálculo da porcentagem acima do ideal
        luz_superior = (((luz_atual * 100) / 200) - 100);


        // Verifica se os campos foram preenchidos
        if (qtd_horas == 0 || luz_atual == 0) {

            id_resultado_luz.innerHTML = `Você nâo preenchou todos os campos de forma correta, <b> tente novamente. </b>`;

            // Iluminação extremamente baixa
        }
        else if (luz_atual < 20) {

            id_resultado_luz.innerHTML = `A iluminação do lote está <b> <span style="color:red;">${luz_inferior.toFixed(2)}% menor <span> </b>do que o necessário para o plantio de 
            <i>Arabidopsis thaliana</i>, o ideal é entre 120-200 µmol·m⁻²·s⁻¹.
            O desenvolvimento da planta será extremamente afetado, com <span style="color:red;"> <b> grande risco de perda da pesquisa </b> </span>.`;

            // Iluminação abaixo do ideal
        } else if (luz_atual < 120) {

            id_resultado_luz.innerHTML = `A iluminação do lote está <b> <span style="color:red;">${luz_inferior.toFixed(2)}% menor <span> </b>do que o necessário para o plantio de 
            <i>Arabidopsis thaliana</i>, o ideal é entre 120-200 µmol·m⁻²·s⁻¹.
            O ciclo da planta ocorrerá de forma completa, porém lento.`;

            // Iluminação ideal
        } else if (luz_atual <= 200) {

            id_resultado_luz.innerHTML = `A iluminação do lote está no nível ideal, a <i> Arabidopsis thaliana </i>
             viveria cerca de 60 dias e completaria seu ciclo corretamente, caso as horas de
             iluminação estejam corretas também.`;

            // Iluminação acima do ideal
        }
        else {

            id_resultado_luz.innerHTML = `A iluminação do lote está <b><span style="color:red;">${luz_superior.toFixed(2)}% maior </span> </b> do que o necessário para o plantio de 
            <i>Arabidopsis thaliana</i>, o ideal é entre 120-200 µmol·m⁻²·s⁻¹. Isso
             causará fotoinibição, afetando o crescimento da planta que não produzirá sementes.
             O desenvolvimento da planta será extremamente afetado, com <span style="color:red;"> <b> grande risco de perda da pesquisa </b> </span>.`;
        }


        // Avaliação das horas de iluminação
        if (qtd_horas == 0 || luz_atual == 0) {

            id_resultado_horas.innerHTML = ``;

            // Abaixo do ideal
        }
        else if (qtd_horas < 16) {

            id_resultado_horas.innerHTML = `A quantidade de horas de iluminação está abaixo do ideal, O ciclo será muito lento
            e a floração atrasará, mesmo com a iluminação ideal.
            A quantidade ideal de horas de iluminação das espécimes da <i><b> Arabidopsis thaliana</i></b> é de 16 horas.`;

            // Ideal
        } else if (qtd_horas == 16) {

            id_resultado_horas.innerHTML = `A quantidade de horas de iluminação está adequada, O ciclo poderá
            ocorrer corretamente, caso a iluminação esteja adequada também.`;

            // Acima do ideal
        }
        else if (qtd_horas > 24) {
            id_resultado_luz.innerHTML = ``;
            id_resultado_horas.innerHTML = `O máximo de horas em um dia são 24 horas! <b> Preencha o campo corretamente. </b>`;
        }
        else {

            id_resultado_horas.innerHTML = `A quantidade de horas de iluminação está acima do ideal, O ciclo será acelerado demais
            o que acarretará em estresse fisiológico, comprometendo resultados positivos, mesmo com a iluminação ideal.
            A quantidade ideal de horas de iluminação das espécimes da <i><b> Arabidopsis thaliana</i></b> é de 16 horas.`;
        }


        // Informações usadas como referência científica
        // iluminação ideal = 120-200 µmol·m⁻²·s⁻¹
        // Tempo de cultivo = 60 dias, sendo 16h de luz e 8h de escuro
        // iluminação baixa = < 20 µmol·m⁻²·s⁻¹ 
        // iluminação média = 20-120 µmol·m⁻²·s⁻¹ 
        // iluminação alta = > 200 µmol·m⁻²·s⁻¹ 

    }

</script>
