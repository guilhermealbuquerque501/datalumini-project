<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Simulador Financeiro Arabidopsis thaliana</title>
</head>

<body>
    <div class="container-simulador">
        <div class="container-simulador-titulo">
            <div class="container-simulado-titulo-h1">
                <h1>Simulador Financeiro: Sensor de iluminação da
                    <span style="font-style: italic; font-weight: 600;">Arabidopsis thaliana</span>
                </h1>
            </div>
            <div class="container-simulador-logo">
                <img src="./images/4.png" alt="">
            </div>
        </div>
        <div class="content-simulador">
            <div class="content-simulador-right">
                <div class="content-right-group">
                    <div class="content-right-row">
                        <label for="">Insira quantas horas por dia seu ambiente controlado permanece ligado:</label>
                        <input type="number" id="id_horasLigado">
                    </div>
                    <div class="content-right-row">
                        <label for="">Insira quantidade de KWh gasto anual:</label>
                        <input type="number" id="id_kwhGasto">
                    </div>
                    <div class="content-right-row">
                        <label for="">Insira preço do KWh em seu ambiente controlado (em R$):</label>
                        <input type="number" id="id_precoKWh">
                    </div>
                    <div class="content-right-button">
                        <button onclick="calcular1()">Calcular gasto monetário anual</button>
                    </div>
                </div>
                <div class="content-right-res">
                    <h3 id="id_mensagem"></h3>
                </div>
            </div>
            <div class="content-simulador-left">
                <div class="content-right-group">
                    <div class="content-right-row">
                        <label for="">Insira a iluminação atual captada pelo sensor (em µmol·m⁻²·s⁻¹):</label>
                        <input type="number" id="id_luz_atual"><br>
                    </div>
                    <div class="content-right-row">
                        <label for="">Insira a quantidade de horas de iluminação do lote da planta:</label>
                        <input type="number" id="id_qtd_horas"><br>
                    </div>
                    <div class="content-right-row">
                    </div>
                    <div class="content-right-button">
                        <button onclick="calcular2()">Calcular resultados esperados</button>
                    </div>
                </div>
                <div class="content-right-res">
                    <h3 id="id_resultado_luz"></h3>
                    <h3 id="id_resultado_horas"></h3>
                </div>
            </div>
        </div>
</body>

</html>

<script>
    function calcular1() {
        let kwhGasto = Number(id_kwhGasto.value);
        let precoKWh = Number(id_precoKWh.value);
        let horasLigado = Number(id_horasLigado.value);
        let totalGasto = kwhGasto * precoKWh;
        let porcentagem = 0;
        let prejuizo = 0;

        if(horasLigado > 16){
             prejuizo = (horasLigado - 16) * 365 * precoKWh;
        }else if (horasLigado == 0) {
         prejuizo = (16) * 365 * precoKWh;
        }else if (horasLigado == 16) {
            prejuizo = 0;
        }else if (horasLigado < 16) {
            prejuizo = (16 - horasLigado) * 365 * precoKWh;
        }

         porcentagem = (prejuizo / totalGasto) * 100;

        id_mensagem.innerHTML = `O seu gasto monetário anual com iluminação em seu ambiente controlado é de R$${totalGasto.toFixed(2)},<br>sendo R$${prejuizo.toFixed(2)}
         só de <span style="color:red">prejuízo</span>, o que equivale a ${porcentagem.toFixed(2)}% do gasto total.<br><br>
         <b>Obs: </b> O valor de retrabalho por câmara da <i>Arabidopsis thaliana</i> não pode ser calculado, por varios fatores 
         váriaveis de produção que deve ser calculo pelo cliente`;
    }

    function calcular2() {
        let qtd_horas = Number(id_qtd_horas.value);
        let luz_atual = Number(id_luz_atual.value);

        // Cálculo que transforma em porcentagem.
        luz_inferior = (100 - ((luz_atual * 100) / 120));
        luz_superior = (((luz_atual * 100) / 120) - 100);

        if (luz_atual < 20) {
            id_resultado_luz.innerHTML = `A iluminação do lote está ${luz_inferior.toFixed(2)}% menor do que o necessário para o plantio de 
            <i>Arabidopsis thaliana</i>, o ideal é entre 120-200 µmol·m⁻²·s⁻¹.
            O desenvolvimento da planta será extremamente lento e impedirá a florada e reprodução, não produzindo sementes.`
        } else if (luz_atual < 120) {
            id_resultado_luz.innerHTML = `A iluminação do lote está ${luz_inferior.toFixed(2)}% menor do que o necessário para o plantio de 
            <i>Arabidopsis thaliana</i>, o ideal é entre 120-200 µmol·m⁻²·s⁻¹.
            O ciclo da planta ocorrerá de forma completa, porém lento.`
        } else if (luz_atual < 200) {
            id_resultado_luz.innerHTML = `A iluminação do lote está no nível ideal, a <i> Arabidopsis thaliana </i>
             viveria cerca de 60 dias e completaria seu ciclo corretamente, caso as horas de
             iluminação estejam corretas também.`
        } else {
            id_resultado_luz.innerHTML = `A iluminação do lote está ${luz_superior.toFixed(2)}% maior do que o necessário para o plantio de 
            <i>Arabidopsis thaliana</i>, o ideal é entre 120-200 µmol·m⁻²·s⁻¹. Isso
             causará fotoinibição, afetando o crescimento da planta que não produzirá sementes.`
        }

        if (qtd_horas < 16) {
            id_resultado_horas.innerHTML = `A quantidade de horas de iluminação está a baixo do ideal, O ciclo será muito lento
            e a floração atrasará, mesmo com a iluminação ideal.`
        } else if (qtd_horas == 16) {
            id_resultado_horas.innerHTML = `A quantidade de horas de iluminação está adequada, O ciclo poderá
            ocorrer corretamente, caso a iluminação esteja adequada também.`
        } else {
            id_resultado_horas.innerHTML = `A quantidade de horas de iluminação está a acima do ideal, O ciclo será acelerado demais
            o que acarretará em estresse fisiológico, comprometendo resultados positivos, mesmo com a iluminação ideal.`
        }

        //iluminação ideal = 120-200 µmol·m⁻²·s⁻¹
        //Tempo de cultivo = 60 dias, sendo 16h do dia e 8h da noite
        //iluminação baixa = 20 µmol·m⁻²·s⁻¹ 
        // iluminação média = 20-120 µmol·m⁻²·s⁻¹ 
        // iluminação alta = > 200 µmol·m⁻²·s⁻¹ 

    }
</script>
